<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>প্রশ্ন জেনারেটর</title>
    <script>
      // Suppress benign Vite WebSocket errors in sandboxed environment
      (function() {
        const suppressPatterns = [
          'failed to connect to websocket',
          'WebSocket closed',
          'WebSocket connection',
          'WebSocket closed without opened',
          'WebSocket is closed',
          'WebSocket error',
          'vite:hmr'
        ];

        window.addEventListener('unhandledrejection', function(event) {
          const msg = (event.reason && (event.reason.message || event.reason)) || '';
          if (typeof msg === 'string' && suppressPatterns.some(p => msg.includes(p))) {
            event.preventDefault();
            event.stopPropagation();
          }
        }, true);

        window.addEventListener('error', function(event) {
          const msg = event.message || '';
          if (typeof msg === 'string' && suppressPatterns.some(p => msg.includes(p))) {
            event.preventDefault();
            event.stopPropagation();
          }
        }, true);

        window.onerror = function(msg, url, line, col, error) {
          const message = (msg || '').toString();
          if (suppressPatterns.some(p => message.includes(p))) {
            return true; // Suppress the error
          }
          return false;
        };

        const originalError = console.error;
        const originalWarn = console.warn;
        const originalDebug = console.debug;

        console.error = (...args) => {
          const msg = args[0] && typeof args[0] === 'string' ? args[0] : '';
          if (suppressPatterns.some(p => msg.includes(p))) return;
          originalError.apply(console, args);
        };

        console.warn = (...args) => {
          const msg = args[0] && typeof args[0] === 'string' ? args[0] : '';
          if (suppressPatterns.some(p => msg.includes(p))) return;
          originalWarn.apply(console, args);
        };

        console.debug = (...args) => {
          const msg = args[0] && typeof args[0] === 'string' ? args[0] : '';
          if (suppressPatterns.some(p => msg.includes(p))) return;
          originalDebug.apply(console, args);
        };
      })();
    </script>
    <style>
      body { background-color: #f8fafc; margin: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
